server.port=${SERVER_PORT:8081}

# Datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/novobank_auth}
spring.datasource.username=${DB_USERNAME:novobank_auth}
spring.datasource.password=${DB_PASSWORD:novobankAuth123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Schema initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# JWT
jwt.secret=${JWT_SECRET:V7iIcU7ylF02xv+7gNrE1fKYjtZFBDnIsMUqpYJdSIs=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.com.novobanco=INFO
logging.level.org.springframework.security=WARN
